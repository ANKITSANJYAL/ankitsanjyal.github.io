<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post — Ankit Sanjyal</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/academic.css">
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    #auth-gate { max-width: 380px; margin: 80px auto; text-align: center; padding: 0 20px; }
    #auth-gate h2 { font-size: 1.2rem; margin-bottom: 16px; color: #111; }
    #auth-gate input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; margin-bottom: 10px; outline: none; }
    #auth-gate input:focus { border-color: #1772d0; }
    #auth-gate button { width: 100%; padding: 10px; background: #1772d0; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    #auth-error { color: #c00; font-size: 0.88rem; margin-top: 6px; display: none; }
    #reset-msg { font-size: 0.85rem; color: #1772d0; margin-top: 8px; display: none; line-height: 1.5; }
    .forgot-link { font-size: 0.82rem; color: #888; cursor: pointer; background: none; border: none; padding: 0; margin-top: 4px; font-family: inherit; text-decoration: underline; }
    .forgot-link:hover { color: #1772d0; }
    #editor-section { display: none; }
    .editor-toolbar-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    #post-title { flex: 1; min-width: 240px; font-size: 1.2rem; font-weight: 700; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; outline: none; }
    #post-title:focus { border-color: #1772d0; }
    #post-tags { width: 200px; font-size: 0.9rem; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; outline: none; }
    #post-tags:focus { border-color: #1772d0; }
    .EasyMDEContainer .CodeMirror { min-height: 380px; font-family: 'Merriweather', Georgia, serif; font-size: 1rem; line-height: 1.8; }
    .action-row { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    .btn-save { padding: 9px 22px; background: #1772d0; color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: #1255a0; }
    .btn-delete { padding: 9px 18px; background: #fff; color: #c00; border: 1px solid #e0b0b0; border-radius: 4px; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
    .btn-delete:hover { background: #fff5f5; }
    .save-status { font-size: 0.82rem; color: #888; margin-left: 4px; }
  </style>
</head>
<body>

<nav id="site-nav">
  <div id="nav-inner">
    <a href="../index.html" class="nav-name">Ankit Sanjyal</a>
    <div id="nav-links">
      <a href="../index.html#news">News</a>
      <a href="../index.html#publications">Publications</a>
      <a href="../index.html#projects">Projects</a>
      <a href="../index.html#experience">Experience</a>
      <a href="index.html">Blog</a>
    </div>
  </div>
</nav>

<div id="auth-gate">
  <h2>Enter password to edit</h2>
  <input type="password" id="pw-input" placeholder="Password" autofocus>
  <button onclick="checkPassword()">Continue</button>
  <div id="auth-error">Wrong password.</div>
  <button class="forgot-link" onclick="resetPassword()">Forgot password?</button>
  <div id="reset-msg"></div>
</div>

<div id="editor-section">
<div id="page-wrap" style="max-width:820px;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
    <h2 class="section-heading" style="margin-top:0; border:none; padding:0; font-size:1.4rem;">Edit Post</h2>
    <a href="index.html" style="font-size:0.88rem; color:#888;">Back to blog</a>
  </div>
  <div class="editor-toolbar-row">
    <input type="text" id="post-title" placeholder="Post title...">
    <input type="text" id="post-tags" placeholder="Tags (comma-separated)">
  </div>
  <textarea id="editor"></textarea>
  <div class="action-row">
    <button class="btn-save" onclick="updatePost()">Save changes</button>
    <button class="btn-delete" onclick="deletePost()">Delete post</button>
    <span class="save-status" id="save-status"></span>
  </div>
</div>
</div>

<script>
  let mde, postId;

  async function hashPassword(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
  }

  async function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    const hash = await hashPassword(pw);
    const savedHash = localStorage.getItem('blog_pw_hash');
    if (!savedHash || hash === savedHash) {
      sessionStorage.setItem('blog_auth', 'ok');
      showEditor();
    } else {
      document.getElementById('auth-error').style.display = 'block';
    }
  }

  async function resetPassword() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#';
    const arr = new Uint8Array(14);
    crypto.getRandomValues(arr);
    const newPw = Array.from(arr).map(b => chars[b % chars.length]).join('');

    const newHash = await hashPassword(newPw);
    localStorage.setItem('blog_pw_hash', newHash);

    const subject = encodeURIComponent('Blog Password Reset — Ankit Sanjyal');
    const body = encodeURIComponent(
      'Your blog password has been reset.\n\nNew password: ' + newPw +
      '\n\nUse this to log in at: https://ankitsanjyal.github.io/blog/write.html\n\nThis password was generated on: ' + new Date().toLocaleString()
    );
    window.location.href = 'mailto:asanjyal82@gmail.com?subject=' + subject + '&body=' + body;

    const msg = document.getElementById('reset-msg');
    msg.innerHTML = 'A new password has been generated and your mail app should open to send it to <strong>asanjyal82@gmail.com</strong>. Check your email, then log in with the new password.';
    msg.style.display = 'block';
    document.getElementById('auth-error').style.display = 'none';
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  if (sessionStorage.getItem('blog_auth') === 'ok') showEditor();

  function showEditor() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('editor-section').style.display = 'block';
    initEditor();
  }

  function initEditor() {
    mde = new EasyMDE({
      element: document.getElementById('editor'),
      spellChecker: false,
      toolbar: ['bold','italic','strikethrough','|','heading-1','heading-2','heading-3','|',
        'quote','code','table','|','unordered-list','ordered-list','|','link','image','|',
        'preview','side-by-side','fullscreen'],
    });

    postId = new URLSearchParams(window.location.search).get('id');
    const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
    const post = posts.find(p => p.id === postId);
    if (!post) { alert('Post not found.'); window.location.href = 'index.html'; return; }

    document.getElementById('post-title').value = post.title;
    document.getElementById('post-tags').value = (post.tags || []).join(', ');
    document.title = 'Edit: ' + post.title;
    mde.value(post.content);
  }

  function excerpt(md) {
    return md.replace(/#+\s/g,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1')
      .replace(/\[(.+?)\]\(.+?\)/g,'$1').replace(/`(.+?)`/g,'$1')
      .replace(/\$\$[\s\S]+?\$\$/g,'[math]').replace(/\$(.+?)\$/g,'$1')
      .trim().slice(0, 200).trim() + (md.length > 200 ? '...' : '');
  }

  function updatePost() {
    const title = document.getElementById('post-title').value.trim();
    const content = mde.value().trim();
    const tagsRaw = document.getElementById('post-tags').value.trim();
    if (!title || !content) { alert('Title and content required.'); return; }
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
    const idx = posts.findIndex(p => p.id === postId);
    if (idx === -1) { alert('Post not found.'); return; }
    posts[idx] = { ...posts[idx], title, content, tags, excerpt: excerpt(content), updated: new Date().toISOString() };
    localStorage.setItem('blog_posts', JSON.stringify(posts));
    document.getElementById('save-status').textContent = 'Saved!';
    setTimeout(() => { window.location.href = 'post.html?id=' + postId; }, 800);
  }

  function deletePost() {
    if (!confirm('Permanently delete this post?')) return;
    const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]').filter(p => p.id !== postId);
    localStorage.setItem('blog_posts', JSON.stringify(posts));
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
