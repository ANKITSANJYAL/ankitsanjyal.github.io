<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Ankit Sanjyal</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/academic.css">
  <style>
    .blog-list { list-style: none; padding: 0; margin-top: 8px; }
    .blog-item { padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
    .blog-item:last-child { border-bottom: none; }
    .blog-item-title { font-size: 1.15rem; font-weight: 700; color: #111; margin-bottom: 4px; }
    .blog-item-title a { color: #111; }
    .blog-item-title a:hover { color: #1772d0; text-decoration: none; }
    .blog-item-meta { font-size: 0.82rem; color: #999; margin-bottom: 6px; }
    .blog-item-excerpt { font-size: 0.92rem; color: #555; line-height: 1.6; }
    .empty-state { color: #999; font-size: 0.95rem; padding: 24px 0; }
    .write-btn { display: inline-block; margin-top: 4px; padding: 7px 18px; background: #1772d0; color: #fff; border-radius: 4px; font-size: 0.88rem; }
    .write-btn:hover { background: #1255a0; color: #fff; text-decoration: none; }
    .blog-tags { margin-top: 4px; }
    .blog-tag { display: inline-block; background: #eef4ff; color: #1772d0; border: 1px solid #c8daf8; border-radius: 10px; font-size: 0.75rem; padding: 1px 8px; margin-right: 4px; }
  </style>
</head>
<body>

<nav id="site-nav">
  <div id="nav-inner">
    <a href="../index.html" class="nav-name">Ankit Sanjyal</a>
    <div id="nav-links">
      <a href="../index.html#news">News</a>
      <a href="../index.html#publications">Publications</a>
      <a href="../index.html#projects">Projects</a>
      <a href="../index.html#experience">Experience</a>
      <a href="index.html" style="color:#1772d0;">Blog</a>
    </div>
  </div>
</nav>

<div id="page-wrap">

  <div style="display:flex; align-items:baseline; justify-content:space-between; margin-top: 12px;">
    <h2 class="section-heading" style="margin-top:0; border:none; padding:0; font-size:1.6rem;">Blog</h2>
    <a href="write.html" class="write-btn">Write a post</a>
  </div>
  <p style="color:#888; font-size:0.88rem; margin-bottom: 28px;">Writing on generative models, multimodal AI, and research notes.</p>

  <ul class="blog-list" id="blog-list">
    <li class="empty-state" id="empty-msg">No posts yet. Be the first to write one.</li>
  </ul>

</div>

<div id="footer" style="max-width:860px;margin:40px auto 20px;padding:20px 20px 0;border-top:1px solid #e0e0e0;font-size:0.82rem;color:#999;text-align:center;">
  <p><a href="../index.html" style="color:#999;">Ankit Sanjyal</a></p>
</div>

<script>
  // Load posts from localStorage
  function loadPosts() {
    const posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
    const list = document.getElementById('blog-list');
    const empty = document.getElementById('empty-msg');

    if (posts.length === 0) {
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = '';

    // Sort newest first
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    posts.forEach(post => {
      const li = document.createElement('li');
      li.className = 'blog-item';

      const date = new Date(post.date).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      const tags = (post.tags || []).map(t =>
        `<span class="blog-tag">${t}</span>`
      ).join('');

      const tagsHtml = tags ? `<div class="blog-tags">${tags}</div>` : '';

      li.innerHTML = `
        <div class="blog-item-title"><a href="post.html?id=${post.id}">${post.title}</a></div>
        <div class="blog-item-meta">${date}</div>
        ${tagsHtml}
        <div class="blog-item-excerpt">${post.excerpt || ''}</div>
      `;
      list.appendChild(li);
    });
  }

  loadPosts();
</script>
</body>
</html>
