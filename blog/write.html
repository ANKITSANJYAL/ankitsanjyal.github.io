<head>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    /* Auth gate */
    #auth-gate { max-width: 380px; margin: 80px auto; text-align: center; padding: 0 20px; }
    #auth-gate h2 { font-size: 1.2rem; margin-bottom: 16px; color: #111; }
    #auth-gate input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; margin-bottom: 10px; outline: none; }
    #auth-gate input:focus { border-color: #1772d0; }
    #auth-gate button { width: 100%; padding: 10px; background: #1772d0; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    #auth-gate button:hover { background: #1255a0; }
    #auth-error { color: #c00; font-size: 0.88rem; margin-top: 6px; display: none; }
    #reset-msg { font-size: 0.85rem; color: #1772d0; margin-top: 8px; display: none; line-height: 1.5; }
    .forgot-link { font-size: 0.82rem; color: #888; cursor: pointer; background: none; border: none; padding: 0; margin-top: 4px; font-family: inherit; text-decoration: underline; }
    .forgot-link:hover { color: #1772d0; }

    /* Editor */
    #editor-section { display: none; }
    .editor-toolbar-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    #post-title { flex: 1; min-width: 240px; font-size: 1.2rem; font-weight: 700; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; outline: none; }
    #post-title:focus { border-color: #1772d0; }
    #post-tags { width: 200px; font-size: 0.9rem; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; outline: none; }
    #post-tags:focus { border-color: #1772d0; }

    /* EasyMDE customizations */
    .EasyMDEContainer .CodeMirror { min-height: 420px; font-family: 'Merriweather', Georgia, serif; font-size: 1rem; line-height: 1.8; border-radius: 0 0 4px 4px; }
    .editor-toolbar { border-radius: 4px 4px 0 0; }
    .editor-preview { font-family: 'Merriweather', Georgia, serif; font-size: 1rem; line-height: 1.8; padding: 20px 24px; }
    .editor-preview h1 { font-size: 1.7rem; margin: 1em 0 0.4em; color: #111; }
    .editor-preview h2 { font-size: 1.3rem; margin: 1.2em 0 0.4em; color: #111; border-bottom: 2px solid #1772d0; padding-bottom: 4px; }
    .editor-preview h3 { font-size: 1.05rem; margin: 1em 0 0.3em; color: #222; }
    .editor-preview p { margin-bottom: 0.9em; color: #333; }
    .editor-preview blockquote { border-left: 3px solid #1772d0; margin: 1em 0; padding: 4px 16px; color: #666; font-style: italic; }
    .editor-preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    .editor-preview table th { background: #f0f0f0; padding: 8px 12px; border: 1px solid #ddd; }
    .editor-preview table td { padding: 7px 12px; border: 1px solid #ddd; }
    .editor-preview code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-size: 0.88em; }
    .editor-preview pre { background: #f5f5f5; padding: 14px 16px; border-radius: 4px; overflow-x: auto; }
    .editor-preview pre code { background: none; padding: 0; }
    .editor-preview img { max-width: 100%; border-radius: 4px; }

    /* Action buttons */
    .action-row { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    .btn-publish { padding: 9px 22px; background: #1772d0; color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
    .btn-publish:hover { background: #1255a0; }
    .btn-save { padding: 9px 18px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: #f5f5f5; }
    .btn-discard { padding: 9px 18px; background: #fff; color: #c00; border: 1px solid #e0b0b0; border-radius: 4px; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
    .btn-discard:hover { background: #fff5f5; }
    .save-status { font-size: 0.82rem; color: #888; margin-left: 4px; }

    /* Saved drafts */
    #drafts-section { margin-top: 36px; }
    .draft-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f4f4f4; font-size: 0.9rem; }
    .draft-item-title { color: #333; font-weight: 600; }
    .draft-item-actions { display: flex; gap: 10px; }
    .draft-item-actions a { font-size: 0.82rem; cursor: pointer; }
    .math-hint { font-size: 0.8rem; color: #888; margin-top: 6px; line-height: 1.5; }
    .math-hint code { background: #f0f0f0; padding: 1px 4px; border-radius: 2px; }
  </style>

<body>

<nav id="site-nav">
  <div id="nav-inner">
    <a href="../index.html" class="nav-name">Ankit Sanjyal</a>

    </div>

</nav>

<!-- AUTH GATE -->
<div id="auth-gate">
  <h2>Enter password to write</h2>
  <input type="password" id="pw-input" placeholder="Password" autofocus>
  <button onclick="checkPassword()">Continue</button>
  <div id="auth-error">Wrong password. Try again.</div>
  <button class="forgot-link" onclick="resetPassword()">Forgot password?</button>
  <div id="reset-msg"></div>
</div>

<!-- EDITOR SECTION (hidden until authenticated) -->
<div id="editor-section">
<div id="page-wrap" style="max-width:820px;">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
    <h2 class="section-heading" style="margin-top:0; border:none; padding:0; font-size:1.4rem;">New Post</h2>
    <a href="index.html" style="font-size:0.88rem; color:#888;">Back to blog</a>
  </div>

  <div class="editor-toolbar-row">
    <input type="text" id="post-title" placeholder="Post title...">
    <input type="text" id="post-tags" placeholder="Tags (comma-separated)">
  </div>

  <textarea id="editor"></textarea>

  <div class="math-hint">
    Math: inline <code>$E = mc^2$</code> or display <code>$$\int_0^\infty f(x)\,dx$$</code>
    &nbsp;|&nbsp; Tables, images, code blocks, blockquotes all supported via Markdown.
  </div>

  <div class="action-row">
    <button class="btn-publish" onclick="publishPost()">Publish</button>
    <button class="btn-save" onclick="saveDraft()">Save draft</button>
    <button class="btn-discard" onclick="discardCurrent()">Discard</button>
    <span class="save-status" id="save-status"></span>
  </div>

  <!-- Drafts -->
  <div id="drafts-section">
    <h3 class="section-heading" style="font-size:1rem; margin-top:36px;">Saved drafts</h3>
    <div id="drafts-list"></div>
  </div>

</div>
</div>

<script>
// ─── Password ───────────────────────────────────────────────────────────────
// SHA-256 hash of your password. Change this to secure your editor.
// Current password: "ankit2026" — change by running: crypto.subtle.digest(...)
// To change: open browser console and run:
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('yourpassword'))
//     .then(b => console.log(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')))
const PASSWORD_HASH = 'c0a9c8f1d2e3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9'; // placeholder
// IMPORTANT: Replace the hash above. See instructions in write.html

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
  const pw = document.getElementById('pw-input').value;

  // For first-time setup: if no hash is set yet, just use a plain comparison
  // with the raw password stored in sessionStorage
  const stored = sessionStorage.getItem('blog_auth');
  if (stored === 'ok') { showEditor(); return; }

  // Check against hash
  const hash = await hashPassword(pw);

  // Bootstrap mode: if PASSWORD_HASH is the placeholder, accept any password
  // and store it as the site password (first-run setup)
  const isPlaceholder = PASSWORD_HASH === 'c0a9c8f1d2e3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9';
  if (isPlaceholder) {
    // Store as the actual password hash in localStorage for future logins
    localStorage.setItem('blog_pw_hash', hash);
    sessionStorage.setItem('blog_auth', 'ok');
    showEditor();
    return;
  }

  const savedHash = localStorage.getItem('blog_pw_hash') || PASSWORD_HASH;
  if (hash === savedHash) {
    sessionStorage.setItem('blog_auth', 'ok');
    showEditor();
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
}

async function resetPassword() {
  // Generate a new random 14-character password
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#';
  const arr = new Uint8Array(14);
  crypto.getRandomValues(arr);
  const newPw = Array.from(arr).map(b => chars[b % chars.length]).join('');

  // Hash and store it immediately as the new password
  const newHash = await hashPassword(newPw);
  localStorage.setItem('blog_pw_hash', newHash);

  // Open mailto link with the new password
  const subject = encodeURIComponent('Blog Password Reset — Ankit Sanjyal');
  const body = encodeURIComponent(
    'Your blog password has been reset.\n\nNew password: ' + newPw +
    '\n\nUse this to log in at: https://ankitsanjyal.github.io/blog/write.html\n\nThis password was generated on: ' + new Date().toLocaleString()
  );
  window.location.href = 'mailto:asanjyal82@gmail.com?subject=' + subject + '&body=' + body;

  // Show confirmation
  const msg = document.getElementById('reset-msg');
  msg.innerHTML = 'A new password has been generated and your mail app should open to send it to <strong>asanjyal82@gmail.com</strong>. Check your email, then log in with the new password.';
  msg.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// Auto-show if already authed in this session
if (sessionStorage.getItem('blog_auth') === 'ok') showEditor();

function showEditor() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('editor-section').style.display = 'block';
  initEditor();
  loadDrafts();
}

// ─── EasyMDE Setup ──────────────────────────────────────────────────────────
let mde;
let editingDraftId = null;

function initEditor() {
  if (mde) return; // already initialized

  mde = new EasyMDE({
    element: document.getElementById('editor'),
    autofocus: true,
    spellChecker: false,
    autosave: { enabled: false },
    placeholder: 'Start writing your post here...\n\nUse # for H1, ## for H2, **bold**, *italic*\nFor math: $E=mc^2$ inline or $$\\frac{d}{dx}$$ display\nFor tables, blockquotes, code — standard Markdown applies.',
    toolbar: [
      'bold', 'italic', 'strikethrough', '|',
      'heading-1', 'heading-2', 'heading-3', '|',
      'quote', 'code', 'table', '|',
      'unordered-list', 'ordered-list', '|',
      'link', 'image', '|',
      'preview', 'side-by-side', 'fullscreen', '|',
      'guide',
      {
        name: 'math-inline',
        action: insertMathInline,
        className: 'fa fa-dollar-sign',
        title: 'Inline math ($...$)',
      },
      {
        name: 'math-display',
        action: insertMathDisplay,
        className: 'fa fa-superscript',
        title: 'Display math ($$...$$)',
      },
    ],
    previewRender: renderPreview,
    renderingConfig: {
      singleLineBreaks: false,
    },
  });
}

function insertMathInline(editor) {
  const cm = editor.codemirror;
  const sel = cm.getSelection();
  cm.replaceSelection('$' + (sel || 'E = mc^2') + '$');
}

function insertMathDisplay(editor) {
  const cm = editor.codemirror;
  const sel = cm.getSelection();
  cm.replaceSelection('\n$$\n' + (sel || '\\int_0^\\infty f(x)\\,dx') + '\n$$\n');
}

// ─── Preview Renderer (Markdown + KaTeX) ────────────────────────────────────
function renderPreview(plainText) {
  // Use EasyMDE's built-in marked for Markdown
  let html = EasyMDE.prototype.markdown(plainText);

  // Render math after a tiny delay (DOM needs to exist)
  setTimeout(() => {
    document.querySelectorAll('.editor-preview, .editor-preview-side').forEach(el => {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true },
        ],
        throwOnError: false,
      });
    });
  }, 50);

  return html;
}

// ─── Storage ────────────────────────────────────────────────────────────────
function getPosts() { return JSON.parse(localStorage.getItem('blog_posts') || '[]'); }
function getDrafts() { return JSON.parse(localStorage.getItem('blog_drafts') || '[]'); }
function savePosts(p) { localStorage.setItem('blog_posts', JSON.stringify(p)); }
function saveDraftsStore(d) { localStorage.setItem('blog_drafts', JSON.stringify(d)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function excerpt(markdown) {
  // Strip markdown syntax for the excerpt
  return markdown
    .replace(/#+\s/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/\[(.+?)\]\(.+?\)/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/\$\$[\s\S]+?\$\$/g, '[math]')
    .replace(/\$(.+?)\$/g, '$1')
    .trim()
    .slice(0, 200)
    .trim() + (markdown.length > 200 ? '...' : '');
}

// ─── Publish ─────────────────────────────────────────────────────────────────
function publishPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = mde.value().trim();
  const tagsRaw = document.getElementById('post-tags').value.trim();

  if (!title) { alert('Please add a title.'); return; }
  if (!content) { alert('Please write some content.'); return; }

  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  const posts = getPosts();

  // Remove from drafts if editing a draft
  if (editingDraftId) {
    const drafts = getDrafts().filter(d => d.id !== editingDraftId);
    saveDraftsStore(drafts);
    editingDraftId = null;
  }

  const post = {
    id: uid(),
    title,
    content,
    excerpt: excerpt(content),
    tags,
    date: new Date().toISOString(),
  };

  posts.unshift(post);
  savePosts(posts);

  setStatus('Published!');
  clearEditor();
  window.location.href = 'post.html?id=' + post.id;
}

// ─── Save Draft ──────────────────────────────────────────────────────────────
function saveDraft() {
  const title = document.getElementById('post-title').value.trim() || '(Untitled draft)';
  const content = mde.value().trim();
  if (!content && !title.startsWith('(')) { setStatus('Nothing to save.'); return; }

  const drafts = getDrafts();

  if (editingDraftId) {
    const idx = drafts.findIndex(d => d.id === editingDraftId);
    if (idx > -1) {
      drafts[idx].title = title;
      drafts[idx].content = content;
      drafts[idx].updated = new Date().toISOString();
      saveDraftsStore(drafts);
      setStatus('Draft updated.');
      loadDrafts();
      return;
    }
  }

  drafts.unshift({ id: uid(), title, content, updated: new Date().toISOString() });
  saveDraftsStore(drafts);
  setStatus('Draft saved.');
  loadDrafts();
}

function discardCurrent() {
  if (!confirm('Discard this post?')) return;
  clearEditor();
  setStatus('');
}

function clearEditor() {
  document.getElementById('post-title').value = '';
  document.getElementById('post-tags').value = '';
  if (mde) mde.value('');
  editingDraftId = null;
}

function setStatus(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

// ─── Drafts List ─────────────────────────────────────────────────────────────
function loadDrafts() {
  const drafts = getDrafts();
  const container = document.getElementById('drafts-list');
  if (drafts.length === 0) {
    container.innerHTML = '<p style="color:#bbb;font-size:0.88rem;">No drafts saved.</p>';
    return;
  }
  container.innerHTML = drafts.map(d => `
    <div class="draft-item">
      <span class="draft-item-title">${d.title}</span>
      <span class="draft-item-actions">
        <a style="color:#1772d0;" onclick="loadDraft('${d.id}')">Edit</a>
        <a style="color:#c00;" onclick="deleteDraft('${d.id}')">Delete</a>
      </span>
    </div>
  `).join('');
}

function loadDraft(id) {
  const drafts = getDrafts();
  const draft = drafts.find(d => d.id === id);
  if (!draft) return;
  document.getElementById('post-title').value = draft.title === '(Untitled draft)' ? '' : draft.title;
  mde.value(draft.content);
  editingDraftId = id;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteDraft(id) {
  if (!confirm('Delete this draft?')) return;
  const drafts = getDrafts().filter(d => d.id !== id);
  saveDraftsStore(drafts);
  if (editingDraftId === id) { clearEditor(); }
  loadDrafts();
}
</script>

<!-- Font Awesome for math toolbar icons -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
